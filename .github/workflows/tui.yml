name: TUI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
    paths:
      - 'tui/**'
      - 'install.sh'

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache-dependency-path: tui/go.sum

      - uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          working-directory: tui

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache-dependency-path: tui/go.sum

      - name: Run tests
        working-directory: tui
        run: go test -v ./...

  build:
    needs: [lint, test]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache-dependency-path: tui/go.sum

      - name: Build binary
        working-directory: tui
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '0'
        run: go build -o streamchop-${{ matrix.goos }}-${{ matrix.goarch }} .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: streamchop-${{ matrix.goos }}-${{ matrix.goarch }}
          path: tui/streamchop-${{ matrix.goos }}-${{ matrix.goarch }}

  test-install:
    needs: build
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - runner: ubuntu-latest
            artifact: streamchop-linux-amd64
          - runner: ubuntu-24.04-arm
            artifact: streamchop-linux-arm64
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: artifacts

      - name: Start local server
        run: |
          python3 -m http.server 18199 --directory artifacts &
          sleep 1

      - name: Test install.sh
        env:
          STREAMCHOP_BASE_URL: http://localhost:18199
        run: |
          sh install.sh
          test -x streamchop

  test-install-unsupported:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Test unsupported OS
        run: |
          if sh install.sh 2>err.log; then
            echo "FAIL: expected install.sh to fail on unsupported OS"
            exit 1
          fi
          grep -q "unsupported OS: darwin" err.log

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true

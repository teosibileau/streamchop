name: CI

on:
  push:
  pull_request:

jobs:
  smoke-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: docker build -t streamchop .

      - name: Test FFmpeg installed
        run: docker run --rm --entrypoint ffmpeg streamchop -version

      - name: Test missing RTSP_URL
        run: |
          output=$(docker run --rm -e RTSP_URL= streamchop 2>&1 || true)
          echo "$output"
          echo "$output" | grep -q "ERROR: RTSP_URL is not set"

      - name: Test bogus RTSP_URL
        run: |
          output=$(docker run --rm -e RTSP_URL=rtsp://bogus:554/test streamchop 2>&1 || true)
          echo "$output"
          echo "$output" | grep -q "resolve hostname"

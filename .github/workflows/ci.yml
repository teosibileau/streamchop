name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  qa:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - run: pip install pre-commit
      - run: pre-commit run --all-files

  rust-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo test --manifest-path emitter/Cargo.toml

  smoke-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: docker build -t streamchop ./chopper

      - name: Test FFmpeg installed
        run: docker run --rm --entrypoint ffmpeg streamchop -version

      - name: Test missing RTSP_URL
        run: |
          output=$(docker run --rm -e RTSP_URL= streamchop 2>&1 || true)
          echo "$output"
          echo "$output" | grep -q "ERROR: RTSP_URL is not set"

      - name: Test bogus RTSP_URL
        run: |
          output=$(docker run --rm -e RTSP_URL=rtsp://bogus:554/test streamchop 2>&1 || true)
          echo "$output"
          echo "$output" | grep -q "resolve hostname"

name: Chopper

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
    paths:
      - 'chopper/**'

env:
  IMAGE: ghcr.io/${{ github.repository }}/chopper

jobs:
  smoke-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: docker build -t streamchop-chopper ./chopper

      - name: Test FFmpeg installed
        run: docker run --rm --entrypoint ffmpeg streamchop-chopper -version

      - name: Test missing RTSP_URL
        run: |
          output=$(docker run --rm -e RTSP_URL= streamchop-chopper 2>&1 || true)
          echo "$output"
          echo "$output" | grep -q "ERROR: RTSP_URL is not set"

      - name: Test bogus RTSP_URL
        run: |
          output=$(docker run --rm -e RTSP_URL=rtsp://bogus:554/test streamchop-chopper 2>&1 || true)
          echo "$output"
          echo "$output" | grep -q "resolve hostname"

  publish:
    needs: smoke-test
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=sha
            type=ref,event=tag
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./chopper
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

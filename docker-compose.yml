---
services:
  chopper_cam_1:
    build: ./chopper
    container_name: streamchop-chopper-cam1
    environment:
      - RTSP_URL=${CAM1_RTSP_URL}
    volumes:
      - ./output/cam1:/output

  mqtt:
    image: rabbitmq:4-management-alpine
    container_name: streamchop-mqtt
    profiles:
      - dev
    environment:
      - RABBITMQ_DEFAULT_USER=guest
      - RABBITMQ_DEFAULT_PASS=guest
    ports:
      - "1883:1883"
      - "15672:15672"
    command: >
      sh -c "rabbitmq-plugins enable rabbitmq_mqtt --offline &&
      rabbitmq-server"

  emitter:
    build: ./emitter
    container_name: streamchop-emitter
    environment:
      - MQTT_HOST=${MQTT_HOST}
      - MQTT_PORT=${MQTT_PORT:-1883}
      - MQTT_TOPIC_PREFIX=${MQTT_TOPIC_PREFIX:-streamchop}
      - HLS_BASE_URL=${HLS_BASE_URL}
      - WATCH_DIR=/output
      - RUST_LOG=info
    volumes:
      - ./output:/output:ro
    depends_on:
      - mqtt

  nginx:
    build: ./nginx
    container_name: streamchop-nginx
    ports:
      - "8080:80"
    volumes:
      - ./output:/usr/share/nginx/html:ro

---
ahoyapi: v2
commands:
  install:
    usage: Install as systemd service
    cmd: |
      source .env
      if [ -z "$SERVICE_FILE" ]; then
        echo "Error: SERVICE_FILE is not set in .env file." >&2
        exit 1
      fi
      if [ ! -f docker-compose.dist.yml ]; then
        echo "Error: docker-compose.dist.yml not found. Run the setup tool first: ahoy tui run" >&2
        exit 1
      fi
      echo "Installing $SERVICE_FILE as systemd service"
      echo "Checking if already installed..."
      if [ -f /etc/systemd/system/$SERVICE_FILE ]; then
        echo "Systemd service already installed. Exiting."
        exit 1
      fi
      rm -f .systemd/$SERVICE_FILE
      sed 's#__PWD__#'$(pwd)'#g' \
          .systemd/$SERVICE_FILE.template > .systemd/$SERVICE_FILE
      sudo mv .systemd/$SERVICE_FILE /etc/systemd/system/$SERVICE_FILE
      sudo systemctl daemon-reload
      sudo systemctl enable $SERVICE_FILE
      sudo systemctl start $SERVICE_FILE
      rm -f .systemd/$SERVICE_FILE
      echo "Systemd service installed and started."

  uninstall:
    usage: Uninstall systemd service
    cmd: |
      source .env
      if [ -z "$SERVICE_FILE" ]; then
        echo "Error: SERVICE_FILE is not set in .env file." >&2
        exit 1
      fi
      echo "Uninstalling systemd service"
      sudo systemctl stop $SERVICE_FILE
      sudo systemctl disable $SERVICE_FILE
      sudo systemctl daemon-reload
      sudo rm /etc/systemd/system/$SERVICE_FILE
      echo "Systemd service uninstalled."

  status:
    usage: Check status of systemd service
    cmd: |
      source .env
      echo "Checking status of systemd service"
      sudo systemctl status $SERVICE_FILE
